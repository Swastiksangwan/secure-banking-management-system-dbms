<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Banking System</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .hero {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(135deg, #007BFF, #0056b3);
      color: white;
    }
    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 15px;
    }
    .hero p {
      font-size: 1.2rem;
      color: #e2e2e2;
    }
    .cta-buttons {
      margin-top: 40px;
    }
    .cta-buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      font-size: 1.1rem;
      color: #007BFF;
      background: white;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .cta-buttons a:hover {
      background: #e9ecef;
      color: #0056b3;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: #555;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <h2>💰 SmartBank</h2>
    </div>
    <div class="nav-right">
      <a href="/login">Customer Login</a>
      <a href="/admin">Admin Login</a>
    </div>
  </header>

  <section class="hero">
    <h1>Welcome to SmartBank</h1>
    <p>Your trusted digital banking system — secure, simple, and efficient.</p>
    <div class="cta-buttons">
      <a href="/login">Customer Login</a>
      <a href="/admin">Admin Panel</a>
    </div>
  </section>

  <footer>
    © 2025 SmartBank | Built for DBMS Project
  </footer>
</body>
</html>
