<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | SmartBank</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background-color: #f7f9fb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #007BFF;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    .navbar h2 {
      margin: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .dashboard {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .dashboard h3 {
      color: #007BFF;
      text-align: center;
      margin-bottom: 25px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #fefefe;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 25px;
      width: 280px;
      text-align: center;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
    }

    .stat-card h4 {
      color: #007BFF;
      margin-bottom: 10px;
    }

    .stat-card p {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
    }

    .links {
      text-align: center;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .links a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <h2>SmartBank Admin</h2>
    <nav>
      <a href="/admin/customers">Customers</a>
      <a href="/admin/accounts">Accounts</a>
      <a href="/admin/transactions">Transactions</a>
      <a href="/admin/audit">Audit Log</a>
      <a href="/admin/logout">Logout</a>
    </nav>
  </header>

  <section class="dashboard">
    <h3>Admin Dashboard</h3>

    <div class="stats">
      <div class="stat-card">
        <h4>Total Customers</h4>
        <p>{{ total_cust }}</p>
      </div>
      <div class="stat-card">
        <h4>Total Accounts</h4>
        <p>{{ total_acc }}</p>
      </div>
    </div>

    <div class="links">
      <a href="/admin/customers">Manage Customers</a>
      <a href="/admin/accounts">Manage Accounts</a>
      <a href="/admin/transactions">View Transaction Log</a>
      <a href="/admin/audit">View Audit Log</a>
    </div>
  </section>
</body>
</html>
