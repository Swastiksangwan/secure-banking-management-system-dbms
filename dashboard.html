<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard | SmartBank</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background-color: #f7f9fb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #007BFF;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
    }

    .navbar h2 {
      margin: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .dashboard {
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .welcome {
      text-align: center;
      color: #007BFF;
      font-size: 1.5rem;
      margin-bottom: 15px;
    }

    .balance-card {
      background: linear-gradient(135deg, #007BFF, #0056b3);
      color: white;
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      margin-bottom: 35px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
    }

    .balance-card h3 {
      font-size: 1.2rem;
      margin: 0 0 10px;
      opacity: 0.9;
    }

    .balance-card p {
      font-size: 2rem;
      font-weight: bold;
      margin: 0;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #fefefe;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px;
      width: 280px;
      text-align: center;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card h4 {
      color: #007BFF;
      margin-bottom: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .actions {
      text-align: center;
      margin-top: 25px;
    }

    .actions a {
      color: #007BFF;
      text-decoration: none;
      font-weight: 500;
    }

    .actions a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <h2>SmartBank</h2>
    <nav>
      <a href="/transactions">Transactions</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <section class="dashboard">
    <div class="welcome">
      <h3>👋 Welcome, {{ user['FirstName'] }}!</h3>
    </div>

    <div class="balance-card">
      <h3>Total Account Balance</h3>
      <p>₹ {{ "%.2f"|format(total_balance) }}</p>
    </div>

    <div class="cards">
      <!-- Deposit Card -->
      <div class="card">
        <h4>Deposit Money</h4>
        <form method="POST" action="/deposit">
          <input type="number" name="account_id" placeholder="Account ID" required>
          <input type="number" step="0.01" name="amount" placeholder="Amount" required>
          <button type="submit">Deposit</button>
        </form>
      </div>

      <!-- Withdraw Card -->
      <div class="card">
        <h4>Withdraw Money</h4>
        <form method="POST" action="/withdraw">
          <input type="number" name="account_id" placeholder="Account ID" required>
          <input type="number" step="0.01" name="amount" placeholder="Amount" required>
          <button type="submit">Withdraw</button>
        </form>
      </div>

      <!-- Transfer Card -->
      <div class="card">
        <h4>Transfer Funds</h4>
        <form method="POST" action="/transfer">
          <input type="number" name="source" placeholder="From Account ID" required>
          <input type="number" name="target" placeholder="To Account ID" required>
          <input type="number" step="0.01" name="amount" placeholder="Amount" required>
          <button type="submit">Transfer</button>
        </form>
      </div>
    </div>

    <div class="actions">
      <a href="/transactions">View Transaction History →</a>
    </div>
  </section>
</body>
</html>
